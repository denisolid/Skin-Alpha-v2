services:
  - type: keyvalue
    name: skinalpha-redis
    plan: starter
    maxmemoryPolicy: noeviction

  - type: web
    name: skinalpha-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @skinalpha/backend prisma:generate && pnpm --filter @skinalpha/backend build
    preDeployCommand: pnpm --filter @skinalpha/backend prisma:migrate:deploy
    startCommand: pnpm --filter @skinalpha/backend start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_RUNTIME
        value: web
      - key: LOG_LEVEL
        value: log,warn,error
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: skinalpha-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_EXTERNAL_REDIRECT_URL
        sync: false
      - key: SESSION_COOKIE_NAME
        value: skinalpha_session
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: none

  - type: worker
    name: skinalpha-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @skinalpha/backend prisma:generate && pnpm --filter @skinalpha/backend build
    startCommand: pnpm --filter @skinalpha/backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_RUNTIME
        value: worker
      - key: LOG_LEVEL
        value: log,warn,error
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: skinalpha-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AUTH_EXTERNAL_REDIRECT_URL
        sync: false
      - key: SESSION_COOKIE_NAME
        value: skinalpha_session
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_COOKIE_SAME_SITE
        value: none
